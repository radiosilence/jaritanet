pre-commit:
  parallel: true
  commands:
    check:
      run: bunx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    typecheck-infra:
      run: bunx tsc -p infra/tsconfig.json
    typecheck-k8s:
      run: bunx tsc -p k8s/tsconfig.json
    typecheck-routes:
      run: bunx tsc -p routes/tsconfig.json
pre-push:
  commands:
    version-check:
      run: curl -sSL https://raw.githubusercontent.com/radiosilence/blit-workflows/refs/heads/main/scripts/tag-latest.sh | bash
