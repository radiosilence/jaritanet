pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: aube run lint:fix {staged_files}
      stage_fixed: true
    format:
      run: aube run fmt {staged_files} --no-error-on-unmatched-pattern
      stage_fixed: true
    typecheck-infra:
      run: aube run typecheck:infra
