pre-commit:
  parallel: true
  commands:
    lint:
      run: npx oxlint --fix {staged_files}
      stage_fixed: true
    format:
      run: npx oxfmt --write {staged_files}
      stage_fixed: true
    typecheck-infra:
      run: npm run typecheck:infra
    typecheck-k8s:
      run: npm run typecheck:k8s
    typecheck-routes:
      run: npm run typecheck:routes
