name: CI/CD

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-cd.yml
      - "packages/**"
      - "*.config.*"
      - package.json
  pull_request:
    paths:
      - .github/workflows/ci-cd.yml
      - "packages/**"
      - "*.config.*"
      - package.json
  workflow_call:
    secrets:
      PULUMI_ACCESS_TOKEN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      HCLOUD_TOKEN:
        required: false
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_SECRET:
        required: true
      KUBE_HOST:
        required: true
      KUBE_API_PORT:
        required: true
      KUBE_TOKEN:
        required: true
      NAVIDROME_HOSTNAME:
        required: true
      FILES_HOSTNAME:
        required: true
      BLIT_HOSTNAME:
        required: true
      TS_AUTHKEY:
        required: false

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        uses: endevco/aube-action@f82ca2f6c943dbde1904945d9f0ee1a0faf8e945 # v1.0.0
        with:
          node-version: auto
          run-install: true
          install-args: --frozen-lockfile

      - name: Lint
        run: aube run lint

  format:
    name: Format
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        uses: endevco/aube-action@f82ca2f6c943dbde1904945d9f0ee1a0faf8e945 # v1.0.0
        with:
          node-version: auto
          run-install: true
          install-args: --frozen-lockfile

      - name: Format Check
        run: aube run fmt:check

  typecheck:
    name: Type Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        uses: endevco/aube-action@f82ca2f6c943dbde1904945d9f0ee1a0faf8e945 # v1.0.0
        with:
          node-version: auto
          run-install: true
          install-args: --frozen-lockfile

      - name: Type Check
        run: aube run typecheck:infra

  test:
    name: Test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        uses: endevco/aube-action@f82ca2f6c943dbde1904945d9f0ee1a0faf8e945 # v1.0.0
        with:
          node-version: auto
          run-install: true
          install-args: --frozen-lockfile

      - name: Run Tests
        run: aube run test

  deploy:
    name: Deploy
    needs: [test, lint, format, typecheck]
    if: |
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') &&
      (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    runs-on: ubuntu-24.04
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        uses: endevco/aube-action@f82ca2f6c943dbde1904945d9f0ee1a0faf8e945 # v1.0.0
        with:
          node-version: auto
          run-install: true
          install-args: --frozen-lockfile

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Detect Server External IP
        if: env.HCLOUD_TOKEN == ''
        env:
          KUBE_HOST: ${{ secrets.KUBE_HOST }}
          KUBE_API_PORT: ${{ secrets.KUBE_API_PORT }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
        run: |
          DECODED_TOKEN=$(printf '%s' "$KUBE_TOKEN" | base64 -d)
          EXTERNAL_IP=$(kubectl \
            --server="https://$KUBE_HOST:$KUBE_API_PORT" \
            --token="$DECODED_TOKEN" \
            --insecure-skip-tls-verify \
            run detect-ip --rm -i --restart=Never --quiet \
            --image=curlimages/curl -- -4 -s https://1.1.1.1/cdn-cgi/trace 2>/dev/null | grep '^ip=' | cut -d= -f2 | tr -d '[:space:]')
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> "$GITHUB_ENV"
          echo "Detected server external IP: $EXTERNAL_IP"

      - name: Configure Stack
        run: |
          pulumi stack select radiosilence/jaritanet/main
          pulumi config set --path jaritanet:cloudflare.accountId "$CLOUDFLARE_ACCOUNT_ID"
          pulumi config set --path jaritanet:traefik.acmeEmail "$ACME_EMAIL"
          pulumi config set --path jaritanet:services.navidrome.hostname "$NAVIDROME_HOSTNAME"
          pulumi config set --path jaritanet:services.files.hostname "$FILES_HOSTNAME"
          pulumi config set --path jaritanet:services.blit.hostname "$BLIT_HOSTNAME"
          pulumi config set --path jaritanet:gateway.xray.serverName "$BLIT_HOSTNAME"
          if [[ -n "$EXTERNAL_IP" ]]; then
            pulumi config set jaritanet:externalIp "$EXTERNAL_IP"
          fi
        working-directory: packages/infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          NAVIDROME_HOSTNAME: ${{ secrets.NAVIDROME_HOSTNAME }}
          FILES_HOSTNAME: ${{ secrets.FILES_HOSTNAME }}
          BLIT_HOSTNAME: ${{ secrets.BLIT_HOSTNAME }}

      - name: Deploy
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: up
          stack-name: radiosilence/jaritanet/main
          work-dir: packages/infra
          refresh: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          KUBE_HOST: ${{ secrets.KUBE_HOST }}
          KUBE_API_PORT: ${{ secrets.KUBE_API_PORT }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}

      # --- Render + distribute the sing-box profile (Option A) ---
      # Pulumi is the single source of truth for node data (primary + edges);
      # the singbox role renders the multi-node profile from it. One deploy →
      # profile regenerated → Telegram notify on change. No node data (e.g. no
      # gateway) → the role no-ops.
      - name: Capture sing-box nodes from Pulumi
        working-directory: packages/infra
        run: |
          set -euo pipefail
          pulumi stack select radiosilence/jaritanet/main
          NODES="$(pulumi stack output singboxNodes --show-secrets --json 2>/dev/null || echo '[]')"
          echo "captured $(printf '%s' "$NODES" | jq 'length') sing-box node(s)"
          {
            echo 'SINGBOX_NODES<<SB_NODES_EOF'
            printf '%s\n' "$NODES"
            echo 'SB_NODES_EOF'
          } >> "$GITHUB_ENV"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # qrencode runs on the runner — the notify task delegates to localhost.
      - name: Install qrencode
        run: sudo apt-get update && sudo apt-get install -y qrencode

      - name: Render + distribute sing-box profile
        uses: dawidd6/action-ansible-playbook@93764e7048f4dd16117d134dadb4b36e8ee73227 # v4
        with:
          playbook: playbook.yml
          directory: ./ansible
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --limit homeservers
            --tags singbox
            --extra-vars "oldboy_host=${{ secrets.OLDBOY_HOST }} oldboy_user=${{ secrets.OLDBOY_USER }} oldboy_password=${{ secrets.OLDBOY_PASSWORD }}"
        env:
          SINGBOX_NODES: ${{ env.SINGBOX_NODES }}
          SINGBOX_SLUG: ${{ secrets.SINGBOX_SLUG }}
          FILES_HOSTNAME: ${{ secrets.FILES_HOSTNAME }}
          SINGBOX_TAILNET_MAGICDNS_SUFFIX: ${{ secrets.SINGBOX_TAILNET_MAGICDNS_SUFFIX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
