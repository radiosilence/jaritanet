name: CI/CD

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci-cd.yml
      - "packages/**"
      - "*.config.*"
      - package.json
  pull_request:
    paths:
      - .github/workflows/ci-cd.yml
      - "packages/**"
      - "*.config.*"
      - package.json
  schedule:
    - cron: "*/30 * * * *"
  workflow_call:
    secrets:
      PULUMI_ACCESS_TOKEN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      HCLOUD_TOKEN:
        required: false
      TS_OAUTH_CLIENT_ID:
        required: true
      TS_OAUTH_SECRET:
        required: true
      KUBE_HOST:
        required: true
      KUBE_API_PORT:
        required: true
      KUBE_TOKEN:
        required: true
      NAVIDROME_HOSTNAME:
        required: true
      FILES_HOSTNAME:
        required: true
      BLIT_HOSTNAME:
        required: true

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format Check
        run: bun run fmt:check

      - name: Type Check
        run: bun run typecheck:infra

      - name: Run Tests
        run: bun run test

  deploy:
    name: Deploy
    needs: test
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') &&
      (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    runs-on: ubuntu-24.04
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install Dependencies
        run: bun install

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Detect Server External IP
        if: env.HCLOUD_TOKEN == ''
        run: |
          EXTERNAL_IP=$(kubectl \
            --server="https://${{ secrets.KUBE_HOST }}:${{ secrets.KUBE_API_PORT }}" \
            --token="$(echo '${{ secrets.KUBE_TOKEN }}' | base64 -d)" \
            --insecure-skip-tls-verify \
            run detect-ip --rm -i --restart=Never \
            --image=curlimages/curl -- -4 -s https://api.ipify.org)
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> "$GITHUB_ENV"
          echo "Detected server external IP: $EXTERNAL_IP"

      - name: Configure Stack
        run: |
          pulumi stack select radiosilence/jaritanet/main
          pulumi config set --path jaritanet:cloudflare.accountId "$CLOUDFLARE_ACCOUNT_ID"
          pulumi config set --path jaritanet:services.navidrome.hostname "$NAVIDROME_HOSTNAME"
          pulumi config set --path jaritanet:services.files.hostname "$FILES_HOSTNAME"
          pulumi config set --path jaritanet:services.blit.hostname "$BLIT_HOSTNAME"
          if [[ -n "$EXTERNAL_IP" ]]; then
            pulumi config set jaritanet:externalIp "$EXTERNAL_IP"
          fi
        working-directory: packages/infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NAVIDROME_HOSTNAME: ${{ secrets.NAVIDROME_HOSTNAME }}
          FILES_HOSTNAME: ${{ secrets.FILES_HOSTNAME }}
          BLIT_HOSTNAME: ${{ secrets.BLIT_HOSTNAME }}

      - name: Deploy
        uses: pulumi/actions@8582a9e8cc630786854029b4e09281acd6794b58 # v6
        with:
          command: up
          stack-name: radiosilence/jaritanet/main
          work-dir: packages/infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          KUBE_HOST: ${{ secrets.KUBE_HOST }}
          KUBE_API_PORT: ${{ secrets.KUBE_API_PORT }}
          KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
