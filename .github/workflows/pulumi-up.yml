name: Pulumi Up

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "pulumi/**"
      - ".github/workflows/pulumi-up.yml"

concurrency:
  group: "pulumi"

jobs:
  up:
    name: Preview
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: pulumi/package.json
          run_install: true
      - run: pnpm i
        working-directory: pulumi
      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: radiosilence/jaritanet/dev
          work-dir: ./pulumi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
