name: 📋 Generate Schemas

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "scripts/gen-schemas.ts"
      - "packages/*/src/conf.schemas.ts"
      - ".github/workflows/generate-schemas.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC

concurrency:
  group: "schemas"

jobs:
  update-schemas:
    name: 📋 Generate & Commit Schemas
    runs-on: ubuntu-24.04
    outputs:
      changes: ${{ steps.check-changes.outputs.changes }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Setup Development Environment
        uses: jdx/mise-action@v2

      - name: 📦 Install Dependencies
        run: bun install

      - name: 🏗️ Create schemas directory
        run: mkdir -p schemas

      - name: 📋 Generate Schemas
        run: bun run scripts/gen-schemas.ts

      - name: 🔍 Check for changes
        id: check-changes
        run: |
          if [[ -n $(git status --porcelain schemas/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "📋 Schema changes detected"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "✅ No schema changes needed"
          fi

      - name: 🚀 Commit and Push Changes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add schemas/
          git commit -m "chore: update generated schemas [skip ci]

          - Updated JSON schemas from TypeScript definitions
          - Auto-generated by GitHub Action
          - Source: scripts/gen-schemas.ts"
          
          git push

      - name: 📊 Generate Summary
        run: |
          echo "## 📋 Schema Update Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.check-changes.outputs.changes }}" == "true" ]]; then
            echo "✅ **Schemas updated and committed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📁 Generated Files:" >> $GITHUB_STEP_SUMMARY
            for file in schemas/*.json; do
              if [[ -f "$file" ]]; then
                echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
              fi
            done
          else
            echo "ℹ️ **No changes needed** - schemas are up to date" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Generated at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "🎯 **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  trigger-downstream:
    name: 🔄 Trigger Pulumi Updates
    needs: update-schemas
    if: needs.update-schemas.outputs.changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: 🔄 Trigger Infrastructure Update
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-infra.yml',
              ref: 'main'
            });
            console.log('🏗️ Triggered infrastructure update workflow');