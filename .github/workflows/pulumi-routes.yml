name: Pulumi Routes

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "routes/**"
      - ".github/workflows/pulumi-routes.yml"

concurrency:
  group: "routes"

jobs:
  up:
    name: Update
    runs-on: ubuntu-24.04
    env:
      working-directory: ./routes
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          package_json_file: ${{env.working-directory}}/package.json
          run_install: true
      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: radiosilence/jaritanet-routes/main
          work-dir: ${{env.working-directory}}/
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
