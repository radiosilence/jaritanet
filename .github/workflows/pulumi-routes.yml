name: Pulumi Routes

permissions:
  contents: read

on:
  workflow_call:
    secrets:
      PULUMI_ACCESS_TOKEN:
        required: true

concurrency:
  group: "routes"

jobs:
  up:
    name: Update
    runs-on: ubuntu-24.04
    env:
      working-directory: ./routes
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: bun install
      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: radiosilence/jaritanet-routes/main
          work-dir: routes
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
