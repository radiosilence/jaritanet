name: Run Ansible Playbook

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - ".github/workflows/run-playbook.yml"
  workflow_dispatch:
    inputs:
      tags:
        description: "Role tags to run (comma-separated, e.g. singbox,nfs). Blank = all."
        required: false
        default: ""

concurrency:
  group: ansible

jobs:
  playbook:
    name: Deploy Configuration
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # need history to diff which roles changed

      # Runs only the roles whose files changed, so an unrelated tweak doesn't
      # sit through microk8s et al. Shared files (playbook, vars, inventory) or a
      # manual dispatch with no tags run everything ("all").
      - name: Determine scope
        id: scope
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.tags }}"
            echo "tags=${T:-all}" >> "$GITHUB_OUTPUT"
            echo "scope: ${T:-all} (manual)"; exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            echo "tags=all" >> "$GITHUB_OUTPUT"; echo "scope: all (no base commit)"; exit 0
          fi
          CHANGED="$(git diff --name-only "$BEFORE" "${{ github.sha }}")"
          echo "changed files:"; echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(ansible/(playbook\.yml|ansible\.cfg|requirements\.yml|group_vars/|host_vars/|inventory/)|\.github/workflows/run-playbook\.yml)'; then
            echo "tags=all" >> "$GITHUB_OUTPUT"; echo "scope: all (shared change)"; exit 0
          fi
          TAGS="$(echo "$CHANGED" | sed -nE 's#^ansible/roles/([^/]+)/.*#\1#p' | sort -u | paste -sd, -)"
          echo "tags=${TAGS:-all}" >> "$GITHUB_OUTPUT"
          echo "scope: ${TAGS:-all}"

      - name: Setup Environment
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh/
          chmod 700 ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          sudo chmod 600 ~/.ssh/*

      - name: Verify Host Connectivity
        run: |
          echo "Checking DNS resolution..."
          nslookup ${{ secrets.OLDBOY_HOST }}
          echo "Testing connectivity..."
          ping -c 3 ${{ secrets.OLDBOY_HOST }}

      # qrencode runs on the controller to build the QR pushed to Telegram (singbox role)
      - name: Install qrencode
        run: sudo apt-get update && sudo apt-get install -y qrencode

      # Mitogen replaces Ansible's per-task interpreter spawn with one long-lived
      # remote process — typically 1.5-3x faster. Wired via env only, so
      # ansible.cfg stays default and local runs are unaffected.
      - name: Enable Mitogen strategy
        run: |
          set -euo pipefail
          python3 -m pip install --user mitogen
          DIR="$(python3 -c 'import os, ansible_mitogen; print(os.path.join(os.path.dirname(ansible_mitogen.__file__), "plugins", "strategy"))')"
          echo "using strategy plugins: $DIR"
          echo "ANSIBLE_STRATEGY_PLUGINS=$DIR" >> "$GITHUB_ENV"
          echo "ANSIBLE_STRATEGY=mitogen_linear" >> "$GITHUB_ENV"

      - name: Execute Ansible Playbook
        uses: dawidd6/action-ansible-playbook@93764e7048f4dd16117d134dadb4b36e8ee73227 # v4
        with:
          playbook: playbook.yml
          directory: ./ansible
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --limit homeservers
            --verbose
            --tags ${{ steps.scope.outputs.tags }}
            --extra-vars "oldboy_host=${{ secrets.OLDBOY_HOST }} oldboy_user=${{ secrets.OLDBOY_USER }} oldboy_password=${{ secrets.OLDBOY_PASSWORD }}"
        env:
          SAMBA_PASSWORD: ${{ secrets.SAMBA_PASSWORD }}
          GIT_SSH_KEY: ${{ secrets.GIT_SSH_KEY }}
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          # sing-box profile generation (roles/singbox)
          FILES_HOSTNAME: ${{ secrets.FILES_HOSTNAME }}
          SINGBOX_SLUG: ${{ secrets.SINGBOX_SLUG }}
          SINGBOX_VPS_IP: ${{ secrets.SINGBOX_VPS_IP }}
          SINGBOX_XRAY_UUID: ${{ secrets.SINGBOX_XRAY_UUID }}
          SINGBOX_XRAY_PUBLIC_KEY: ${{ secrets.SINGBOX_XRAY_PUBLIC_KEY }}
          SINGBOX_XRAY_SHORT_ID: ${{ secrets.SINGBOX_XRAY_SHORT_ID }}
          SINGBOX_XRAY_SERVER_NAME: ${{ secrets.SINGBOX_XRAY_SERVER_NAME }}
          SINGBOX_HYSTERIA_AUTH_PASSWORD: ${{ secrets.SINGBOX_HYSTERIA_AUTH_PASSWORD }}
          SINGBOX_HYSTERIA_OBFS_PASSWORD: ${{ secrets.SINGBOX_HYSTERIA_OBFS_PASSWORD }}
          SINGBOX_TAILNET_MAGICDNS_SUFFIX: ${{ secrets.SINGBOX_TAILNET_MAGICDNS_SUFFIX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Only meaningful when microk8s ran — that role generates the kubeconfig
      # secrets this pushes.
      - name: Update GitHub Secrets
        if: ${{ steps.scope.outputs.tags == 'all' || contains(steps.scope.outputs.tags, 'microk8s') }}
        run: ./scripts/update-secrets
        env:
          GITHUB_TOKEN: ${{ secrets.SECRETS_PAT }}
