name: Run Playbook

permissions:
  contents: read
  packages: write
  actions: write

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - ".github/workflows/run-playbook.yml"

concurrency:
  group: "ansible"

jobs:
  playbook:
    name: Run Playbook
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v2
      - uses: jdx/mise-action@v2
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: ping oldboy
        run: |
          tailscale status --json | yq -P
          # Show detailed path information to oldboy
          tailscale netcheck 

          # See if DERP is being used (relay servers)
          tailscale debug derp-map | yq -P

          # Check latency to the target
          tailscale ping oldboy
          sleep 5
          ping oldboy.zonkey-jazz.ts.net -c 2
          sleep 5
          ping oldboy.zonkey-jazz.ts.net -c 2
          tailscale status
      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh/
          chmod 700 ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          sudo chmod 600 ~/.ssh/*
      - name: Run playbook
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: playbook.yml
          directory: ./ansible
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          options: |
            --limit homeservers
            --verbose
        env:
          SAMBA_PASSWORD: ${{ secrets.SAMBA_PASSWORD }}
          GIT_SSH_KEY: ${{ secrets.GIT_SSH_KEY }}

      - name: Set GitHub Secrets
        run: ./scripts/update-secrets
        env:
          GITHUB_TOKEN: ${{ secrets.SECRETS_PAT }}
