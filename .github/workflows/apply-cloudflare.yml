name: Apply DNS to Cloudflare

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/apply-cloudflare.yml"

env:
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  CONFIG_DIRECTORY: "./terraform"

concurrency:
  group: "apply-cloudflare"

jobs:
  apply-dns:
    concurrency: 1
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: apply-upload
        with:
          organization: ${{ vars.TF_CLOUD_ORGANIZATION }}
          workspace: ${{ vars.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: create-run
        with:
          organization: ${{ vars.TF_CLOUD_ORGANIZATION }}
          workspace: ${{ vars.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        if: fromJSON(steps.create-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        with:
          run: ${{ steps.create-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"

      - name: Get Terraform Output
        id: workspace-output
        uses: hashicorp/tfc-workflows-github/actions/workspace-output@v1.3.2
        with:
          organization: ${{ vars.TF_CLOUD_ORGANIZATION }}
          workspace: ${{ vars.TF_WORKSPACE }}
