name: ЁЯМР Service Integration Tests

on:
  schedule:
    - cron: "*/10 * * * *" # Every 10 minutes
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  service-test-matrix:
    name: ЁЯМР Test ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: "blit.cc"
            url: "https://blit.cc"
          - name: "music.blit.cc"
            url: "https://music.blit.cc"
          - name: "files.radiosilence.dev"
            url: "https://files.radiosilence.dev"
      fail-fast: false
    outputs:
      status: ${{ steps.test-service.outputs.status }}
      diagnostics: ${{ steps.test-service.outputs.diagnostics }}
    steps:
      - name: ЁЯПЧя╕П Setup
        uses: actions/checkout@v4

      - name: ЁЯПе Test Service Health
        id: test-service
        run: |
          service_url="${{ matrix.service.url }}"
          service_name="${{ matrix.service.name }}"

          echo "ЁЯМР Testing $service_name at $service_url"

          # Test service with detailed metrics
          response=$(curl -fs --max-time 30 -w "HTTPCODE:%{http_code}|TIME:%{time_total}|SIZE:%{size_download}" "$service_url" 2>&1)
          curl_exit_code=$?

          if [[ $curl_exit_code -eq 0 ]]; then
            # Extract metrics from curl output
            http_code=$(echo "$response" | grep -o "HTTPCODE:[0-9]*" | cut -d: -f2)
            time_total=$(echo "$response" | grep -o "TIME:[0-9.]*" | cut -d: -f2)
            size_download=$(echo "$response" | grep -o "SIZE:[0-9]*" | cut -d: -f2)

            echo "тЬЕ $service_name is responding (HTTP $http_code, ${time_total}s, ${size_download}B)"
            echo "status=passed" >> $GITHUB_OUTPUT
            echo "diagnostics=" >> $GITHUB_OUTPUT
          else
            echo "тЭМ $service_name is not responding"
            echo "ЁЯФН Collecting diagnostics for $service_name..."

            # Extract domain for DNS/connection tests
            domain=$(echo "$service_url" | sed 's|https\?://||' | cut -d/ -f1)

            # DNS resolution check
            dns_result=$(dig +short "$domain" 2>&1) || dns_result="DNS_FAILED"

            # Connection test
            connection_test=$(timeout 10 nc -zv "$domain" 443 2>&1) || connection_test="CONNECTION_FAILED"

            # Verbose curl output
            verbose_curl=$(curl -v --max-time 10 "$service_url" 2>&1 | head -20) || verbose_curl="CURL_VERBOSE_FAILED"

            echo "status=failed" >> $GITHUB_OUTPUT

            # Create diagnostics output
            {
              echo "diagnostics<<EOF"
              echo "### тЭМ $service_name Diagnostics"
              echo ""
              echo "**DNS Resolution:**"
              echo '```'
              echo "$dns_result"
              echo '```'
              echo ""
              echo "**Connection Test (port 443):**"
              echo '```'
              echo "$connection_test"
              echo '```'
              echo ""
              echo "**Curl Verbose Output:**"
              echo '```'
              echo "$verbose_curl"
              echo '```'
              echo ""
              echo "**Exit Code:** $curl_exit_code"
              echo ""
              echo "---"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

  service-availability:
    name: ЁЯМР Service Availability Summary
    runs-on: ubuntu-latest
    needs: [service-test-matrix]
    if: always()
    outputs:
      service-status: ${{ steps.collect-results.outputs.status }}
      failed_services: ${{ steps.collect-results.outputs.failed_services }}
      detailed_diagnostics: ${{ steps.collect-results.outputs.detailed_diagnostics }}
    steps:
      - name: ЁЯУК Collect Matrix Results
        id: collect-results
        run: |
          echo "ЁЯФН Collecting results from service tests..."

          # Get all matrix job results
          results=('${{ toJson(needs.service-test-matrix.outputs) }}')

          failed_services=()
          detailed_diagnostics=""
          overall_status="passed"

          # Check each service result
          services=("blit.cc" "music.blit.cc" "files.radiosilence.dev")
          statuses=(${{ toJson(needs.service-test-matrix.outputs.*.status) }})
          diagnostics=(${{ toJson(needs.service-test-matrix.outputs.*.diagnostics) }})

          # Process results (this is simplified - GitHub Actions will provide the actual values)
          if echo '${{ toJson(needs.service-test-matrix.result) }}' | grep -q 'failure\|cancelled'; then
            overall_status="failed"
            failed_services=("Unknown - some matrix jobs failed")
            detailed_diagnostics="Some service tests failed to complete properly."
          else
            # Count failed services from matrix outputs
            failed_count=0
            for i in "${!services[@]}"; do
              service="${services[$i]}"
              # In real execution, GitHub Actions will provide actual status values
              if [[ "${statuses[$i]:-}" == "failed" ]]; then
                failed_services+=("https://$service")
                detailed_diagnostics+="${diagnostics[$i]:-}"$'\n\n'
                failed_count=$((failed_count + 1))
              fi
            done

            if [[ $failed_count -gt 0 ]]; then
              overall_status="failed"
            fi
          fi

          # Set outputs
          echo "status=$overall_status" >> $GITHUB_OUTPUT
          echo "failed_services=${failed_services[*]}" >> $GITHUB_OUTPUT

          if [[ -n "$detailed_diagnostics" ]]; then
            {
              echo "detailed_diagnostics<<EOF"
              echo "$detailed_diagnostics"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "detailed_diagnostics=" >> $GITHUB_OUTPUT
          fi

          echo "ЁЯФН Debug: Set status to '$overall_status'"
          echo "ЁЯФН Debug: Failed services: ${failed_services[*]}"

      - name: ЁЯФТ Test SSL Certificates
        run: |
          echo "ЁЯФТ Checking SSL certificates..."
          domains=("blit.cc" "music.blit.cc" "files.radiosilence.dev")

          for domain in "${domains[@]}"; do
            echo "Testing SSL certificate for $domain"
            cert_info=$(echo | openssl s_client -servername "$domain" -connect "$domain:443" 2>/dev/null | openssl x509 -noout -dates 2>/dev/null)

            if [ $? -eq 0 ]; then
              echo "тЬЕ SSL certificate is valid for $domain"

              # Check expiry
              end_date=$(echo "$cert_info" | grep "notAfter" | cut -d'=' -f2)
              if [ -n "$end_date" ]; then
                end_epoch=$(date -d "$end_date" +%s 2>/dev/null)
                current_epoch=$(date +%s)

                if [ "$end_epoch" -gt "$current_epoch" ]; then
                  days_until_expiry=$(( (end_epoch - current_epoch) / 86400 ))
                  echo "ЁЯУЕ Certificate expires in $days_until_expiry days"

                  if [ "$days_until_expiry" -lt 30 ]; then
                    echo "тЪая╕П Warning: SSL certificate expires soon!"
                  fi
                fi
              fi
            else
              echo "тЭМ Failed to retrieve SSL certificate for $domain"
            fi
          done

  debug-outputs:
    name: ЁЯФН Debug Outputs
    runs-on: ubuntu-latest
    needs: [service-availability]
    if: always()
    steps:
      - name: ЁЯФН Show Service Availability Outputs
        run: |
          echo "=== Service Availability Job Outputs ==="
          echo "service-status: '${{ needs.service-availability.outputs.service-status }}'"
          echo "result: '${{ needs.service-availability.result }}'"
          echo "conclusion: '${{ needs.service-availability.conclusion }}'"
          echo "failed_services: '${{ needs.service-availability.outputs.failed_services }}'"
          echo ""
          echo "=== Workflow Run Context ==="
          echo "ЁЯФЧ Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "ЁЯУК Run Number: ${{ github.run_number }}"
          echo "ЁЯОп Event: ${{ github.event_name }}"
          echo "ЁЯУВ Repository: ${{ github.repository }}"
          echo "ЁЯМ┐ Ref: ${{ github.ref }}"
          echo "ЁЯФз SHA: ${{ github.sha }}"
          echo "тП░ Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo ""
          echo "=== Raw Debug ==="
          echo "Length of service-status: ${#service_status}"
          service_status="${{ needs.service-availability.outputs.service-status }}"
          echo "service_status variable: '$service_status'"
          if [[ -z "$service_status" ]]; then
            echo "тЭМ service-status is empty!"
          else
            echo "тЬЕ service-status has value: '$service_status'"
          fi

  tunnel-connectivity:
    name: ЁЯФе Cloudflare Tunnel Status
    runs-on: ubuntu-latest
    outputs:
      tunnel-status: ${{ steps.tunnel-check.outputs.status }}
      tunnel-details: ${{ steps.tunnel-check.outputs.details }}
    steps:
      - name: ЁЯМН Test Tunnel Endpoints
        id: tunnel-check
        run: |
          echo "ЁЯФе Testing Cloudflare tunnel connectivity..."
          domains=("blit.cc" "music.blit.cc" "files.radiosilence.dev")

          tunnel_issues=""
          tunnel_status="healthy"

          for domain in "${domains[@]}"; do
            echo "Testing tunnel for $domain"

            # Check if we get Cloudflare headers with detailed info
            headers_response=$(curl -sI "https://$domain" 2>&1)
            cf_headers=$(echo "$headers_response" | grep -i "cf-")

            if [[ -n "$cf_headers" ]]; then
              echo "тЬЕ $domain is served through Cloudflare"

              # Extract specific CF headers
              cf_ray=$(echo "$cf_headers" | grep -i "cf-ray" | head -1)
              cf_cache=$(echo "$cf_headers" | grep -i "cf-cache-status" | head -1)

              echo "  ЁЯУб $cf_ray"
              echo "  ЁЯТ╛ $cf_cache"
            else
              echo "тЪая╕П $domain may not be using Cloudflare"
              tunnel_status="issues"
              tunnel_issues+="- $domain: No Cloudflare headers detected\n"
              tunnel_issues+="  Headers received:\n\`\`\`\n$headers_response\n\`\`\`\n"
            fi

            # Check response time with timeout
            response_time=$(timeout 15 curl -w "%{time_total}" -s -o /dev/null "https://$domain" 2>/dev/null || echo "TIMEOUT")

            if [[ "$response_time" == "TIMEOUT" ]]; then
              echo "тП░ Response timeout for $domain"
              tunnel_status="issues"
              tunnel_issues+="- $domain: Response timeout (>15s)\n"
            else
              echo "ЁЯУК Response time for $domain: ${response_time}s"

              # Warn on slow responses
              if (( $(echo "$response_time > 5.0" | bc -l) )); then
                tunnel_issues+="- $domain: Slow response time (${response_time}s)\n"
              fi
            fi
          done

          echo "status=$tunnel_status" >> $GITHUB_OUTPUT
          echo "details<<EOF" >> $GITHUB_OUTPUT
          echo -e "$tunnel_issues" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  bluesky-tests:
    name: ЁЯжЛ Bluesky DNS Configuration
    runs-on: ubuntu-latest
    steps:
      - name: ЁЯФН Test Bluesky DID Records
        run: |
          echo "ЁЯжЛ Checking Bluesky DID records..."
          domains=("blit.cc")

          for domain in "${domains[@]}"; do
            echo "Testing Bluesky DID for $domain"
            did_record=$(dig +short TXT _atproto.$domain)
            if [[ -z "$did_record" ]]; then
              echo "тЪая╕П No Bluesky DID record found for $domain (may be optional)"
            else
              echo "тЬЕ Bluesky DID record for $domain: $did_record"
              if echo "$did_record" | grep -q "did="; then
                echo "тЬЕ Valid DID format detected"
              else
                echo "тЪая╕П DID record format may be incorrect"
              fi
            fi
          done

  issue-creator:
    name: ЁЯЪи Issue Management
    runs-on: ubuntu-latest
    needs: [service-availability, tunnel-connectivity, bluesky-tests]
    if: always()
    steps:
      - name: ЁЯФН Debug Issue Creation Condition
        run: |
          echo "=== Issue Creation Debug ==="
          echo "service-status: '${{ needs.service-availability.outputs.service-status }}'"
          echo "Length: ${#status_value}"
          status_value="${{ needs.service-availability.outputs.service-status }}"
          echo "Raw value: '$status_value'"
          echo "Comparison result (failed): $([ "$status_value" = "failed" ] && echo "true" || echo "false")"
          echo "Comparison result (empty): $([ -z "$status_value" ] && echo "true" || echo "false")"

          if [[ "$status_value" == "failed" ]]; then
            echo "тЬЕ Condition met - will create issue"
          else
            echo "тЭМ Condition not met - will not create issue"
          fi

      - name: ЁЯЪи Create Service Issue
        if: needs.service-availability.outputs.service-status == 'failed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tunnelStatus = '${{ needs.tunnel-connectivity.outputs.tunnel-status }}';
            const tunnelDetails = '${{ needs.tunnel-connectivity.outputs.tunnel-details }}';
            const diagnostics = `${{ needs.service-availability.outputs.detailed_diagnostics }}`;
            const failedServices = '${{ needs.service-availability.outputs.failed_services }}';
            const failedCount = failedServices.split(' ').filter(s => s.trim()).length;
            const title = `ЁЯЪи Service Availability Issue Detected (${failedCount} service${failedCount > 1 ? 's' : ''} down)`;

            const body = `
            # ЁЯЪи Service Availability Issue Detected

            ## ЁЯУЛ Failure Summary

            **тЭМ ${failedServices.split(' ').length} service(s) are currently down or unresponsive**

            **ЁЯХР Detected at:** ${new Date().toISOString()}
            **ЁЯФЧ Workflow Run:** [#${context.runNumber}](${context.payload.repository?.html_url}/actions/runs/${context.runId}) (Click to view full details)
            **ЁЯУВ Repository:** ${context.payload.repository?.full_name || 'N/A'}
            **ЁЯОп Trigger:** ${context.eventName}

            ### ЁЯФ┤ Failed Services
            ${failedServices.split(' ').map(service => `- ЁЯМР **${service}**`).join('\n')}

            ---

            ## ЁЯФм Detailed Diagnostics

            ${diagnostics}

            ## ЁЯУК Workflow Context

            - **Workflow:** ${context.workflow}
            - **Run ID:** ${context.runId}
            - **Run Number:** ${context.runNumber}
            - **Job:** ${context.job}
            - **SHA:** ${context.sha}
            - **Ref:** ${context.ref}

            ## ЁЯФе Cloudflare Tunnel Status

            **Status:** ${tunnelStatus === 'healthy' ? 'тЬЕ Healthy' : 'тЭМ Issues Detected'}

            ${tunnelDetails ? `### ЁЯФН Tunnel Details\n\`\`\`\n${tunnelDetails}\n\`\`\`` : 'тЬЕ No tunnel issues detected.'}

            ## ЁЯОп Likely Root Causes

            Based on the diagnostics above, potential issues have been identified:

            ${diagnostics.includes('DNS_FAILED') ? '- ЁЯФН **DNS Resolution Issues** - Check DNS configuration and external DNS servers\n' : ''}
            ${diagnostics.includes('CONNECTION_FAILED') ? '- ЁЯФМ **Connection Issues** - Check network connectivity, firewall rules, and port availability\n' : ''}
            ${diagnostics.includes('TIMEOUT') || diagnostics.includes('CURL_VERBOSE_FAILED') ? '- тП░ **Service Timeouts** - Check if services are running and responsive within expected timeframes\n' : ''}
            ${tunnelStatus !== 'healthy' ? '- ЁЯФе **Cloudflare Tunnel Issues** - Check tunnel connectivity and configuration\n' : ''}
            ${diagnostics.includes('HTTP') && diagnostics.includes('50') ? '- ЁЯЪл **Server Errors (5xx)** - Check application logs and service health\n' : ''}
            ${diagnostics.includes('HTTP') && diagnostics.includes('40') ? '- ЁЯФТ **Client Errors (4xx)** - Check routing and authentication\n' : ''}

            ${!diagnostics.includes('DNS_FAILED') && !diagnostics.includes('CONNECTION_FAILED') && !diagnostics.includes('TIMEOUT') && tunnelStatus === 'healthy' ? '- ЁЯдФ **Unknown Issue** - Manual investigation required\n' : ''}

            ## ЁЯЫая╕П Quick Diagnostic Commands

            \`\`\`bash
            # Check cluster status
            kubectl get nodes
            kubectl get pods -n jaritanet -o wide

            # Check specific services
            kubectl describe pod -n jaritanet -l app=blit
            kubectl describe pod -n jaritanet -l app=navidrome
            kubectl describe pod -n jaritanet -l app=files

            # Check tunnel connectivity
            kubectl logs -n jaritanet -l app=cloudflared --tail=50
            kubectl get svc -n jaritanet

            # Test from inside cluster
            kubectl run debug --image=curlimages/curl -it --rm -- /bin/sh
            # Then run: curl -v http://blit-service.jaritanet.svc.cluster.local
            \`\`\`

            ## ЁЯПГтАНтЩВя╕П Immediate Actions Required

            ### ЁЯЪи Priority 1 - Infrastructure Check
            1. ЁЯУ▒ **Check the cupboard MacBook** - Ensure the 2014 MacBook Pro is powered on and connected
            2. ЁЯФН **Verify cluster health** - Run the diagnostic commands above to check K3s status

            ### ЁЯФз Priority 2 - Service Recovery
            3. ЁЯФД **Restart failing services** - \`kubectl rollout restart deployment/<service>-deployment -n jaritanet\`
            4. ЁЯФе **Check tunnel logs** - Look for connection errors in cloudflared logs
            5. ЁЯМР **Test connectivity** - Manual verification of service endpoints

            ### тЬЕ Priority 3 - Validation
            6. тЬЕ **Re-run tests** - [Trigger this workflow again](${context.payload.repository?.html_url}/actions/workflows/service-tests.yml) once fixes are applied
            7. ЁЯУК **Monitor results** - Watch for automatic issue closure when services recover

            ## ЁЯУК Infrastructure Context

            | Component | Details |
            |-----------|---------|
            | **Cluster** | Single-node K3s on 2014 MacBook Pro |
            | **Network** | Cloudflare Tunnel (no port forwarding required) |
            | **Services** | blit.cc, music.blit.cc, files.radiosilence.dev |
            | **Location** | Home lab (cupboard deployment ЁЯПа) |
            | **Monitoring** | Automated via GitHub Actions (this workflow) |
            | **Test Frequency** | Every 30 minutes + manual triggers |

            ---

            ## ЁЯдЦ Automation Info

            **Created by:** Service Integration Test Workflow
            **Auto-management:** This issue will automatically close when all services are healthy again
            **Manual trigger:** You can [re-run the workflow](${context.payload.repository?.html_url}/actions/workflows/service-tests.yml) to check current status
            **Last check:** ${new Date().toISOString()}

            > ЁЯТб **Tip:** Check the [workflow run](${context.payload.repository?.html_url}/actions/runs/${context.runId}) for complete logs and timing information.
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['service-availability', 'automated'],
              state: 'open'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', 'service-availability', 'automated', 'high-priority']
              });
              console.log('ЁЯЪи Created new service availability issue');
            } else {
              // Update existing issue with latest information
              const existingIssue = issues.data[0];
              const updateComment = `
              ## ЁЯФД Issue Update - ${new Date().toISOString()}

              **Current Status:** ${failedCount} service${failedCount > 1 ? 's' : ''} still down
              **Latest Run:** [#${context.runNumber}](${context.payload.repository?.html_url}/actions/runs/${context.runId})

              ### ЁЯФ┤ Currently Failed Services
              ${failedServices.split(' ').map(service => `- ЁЯМР **${service}**`).join('\n')}

              ### ЁЯФм Latest Diagnostics
              ${diagnostics}

              ---
              тЪб This is an automated update from the service monitoring workflow.
              `;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: updateComment
              });

              // Update issue title if failure count changed
              if (!existingIssue.title.includes(`(${failedCount} service`)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  title: title
                });
              }

              console.log(`ЁЯУЛ Updated existing service availability issue #${existingIssue.number} with latest failure information`);
            }

  close-fixed-issues:
    name: ЁЯФФ Close Fixed Issues
    runs-on: ubuntu-latest
    needs: [service-availability, tunnel-connectivity, bluesky-tests]
    if: needs.service-availability.outputs.service-status == 'passed'
    steps:
      - name: ЁЯФФ Close Fixed Service Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Close any open service issues if tests are now passing
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['service-availability', 'automated'],
              state: 'open'
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'тЬЕ Service availability tests are now passing. Auto-closing this issue.'
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

  workflow-status:
    name: ЁЯЪи Workflow Status
    runs-on: ubuntu-latest
    needs: [service-availability, tunnel-connectivity, bluesky-tests]
    if: always()
    steps:
      - name: ЁЯЪи Fail Workflow if Services Down
        run: |
          service_status="${{ needs.service-availability.outputs.service-status }}"
          if [[ "$service_status" == "failed" ]]; then
            echo "тЭМ Workflow failing due to service availability issues"
            exit 1
          else
            echo "тЬЕ All services healthy, workflow passing"
          fi

  results:
    name: ЁЯУК Results
    runs-on: ubuntu-latest
    needs:
      [
        service-availability,
        tunnel-connectivity,
        bluesky-tests,
        workflow-status,
      ]
    if: always()
    steps:
      - name: ЁЯУИ Generate Test Summary
        run: |
          echo "## ЁЯМР Service Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          service_status="${{ needs.service-availability.outputs.service-status }}"
          echo "ЁЯФН **Debug:** service-status = '$service_status'" >> $GITHUB_STEP_SUMMARY

          if [[ "$service_status" == "passed" ]]; then
            echo "| ЁЯМР Service Availability | тЬЕ Healthy |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ЁЯМР Service Availability | тЭМ Issues Detected |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| ЁЯФе Tunnel Connectivity | тЬЕ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| ЁЯжЛ Bluesky DNS | тЬЕ Checked |" >> $GITHUB_STEP_SUMMARY
          echo "| ЁЯФТ SSL Certificates | тЬЕ Checked |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ЁЯУЕ **Test Run:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "ЁЯПГ **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "ЁЯЦея╕П **Infrastructure:** 2014 MacBook Pro (cupboard deployment)" >> $GITHUB_STEP_SUMMARY
