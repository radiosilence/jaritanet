---
- name: Install required system packages
  ansible.builtin.apt:
    name:
      - snapd
    state: present

- name: Install microk8s via snap
  community.general.snap:
    name: microk8s
    classic: true
    channel: stable

- name: Create microk8s group
  ansible.builtin.group:
    name: microk8s
    state: present

- name: Add current user to microk8s group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups:
      - microk8s
    append: true

- name: Add user to microk8s group
  ansible.builtin.user:
    name: "{{ username }}"
    groups:
      - microk8s
    append: true

- name: Start microk8s
  ansible.builtin.command: microk8s start

- name: Enable microk8s addons
  ansible.builtin.command: "microk8s enable {{ item }}"
  loop:
    - community
    - ingress
    - dns
    - storage
    - cert-manager
    - helm
  register: microk8s_addons
  changed_when: microk8s_addons.rc == 0

- name: Ensure temporary directory exists
  ansible.builtin.file:
    path: /tmp/k8s-files
    state: directory
    mode: "0755"

- name: Copy Kubernetes YAML files to the host
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /tmp/k8s-files/
    mode: "0644"
  with_items: "{{ k8s_configs }}"

- name: Apply the Kubernetes YAML files
  ansible.builtin.command: kubectl apply -f "{{ item }}"
  with_fileglob: /tmp/k8s-files/*.yml

- name: Verify Kubernetes resources are created
  ansible.builtin.command: kubectl get all
  register: result

- name: Show result
  ansible.builtin.debug:
    var: result.stdout
