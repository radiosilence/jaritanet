apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-cronjob
spec:
  schedule: {{ .Values.schedule | quote }}
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      # backoffLimit: 3
      ttlSecondsAfterFinished: 86400 
      template:
        spec:
          containers:
          - name: ip-updater
            image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
            imagePullPolicy: {{ .Values.image.pullPolicy }}
            volumeMounts:
            - name: ssh
              mountPath: /tmp/ssh
              readOnly: true
            - name: scripts
              mountPath: /scripts
            env:
            - name: GIT_SSH_COMMAND
              value: ssh -o UserKnownHostsFile=/root/.ssh/known_hosts -o StrictHostKeyChecking=no -i /root/.ssh/id_ed25519
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting IP update automation..."
              echo "Current time: $(date)"
              echo "Running on node $(hostname)"
              echo "Installing required packages..."
              apk add bash curl jq

              echo "Creating SSH directory..."  
              mkdir ~/.ssh
              chmod 700 ~/.ssh
              cp /tmp/ssh/* ~/.ssh/
              chmod 600 ~/.ssh/*
              echo "Adding newline to files..."
              sed -i -e '$a\' ~/.ssh/*

              /scripts/update-ip.sh

          volumes:
          - name: scripts
            configMap:
              name: {{ .Release.Name }}-scripts
              defaultMode: 0755
          - name: ssh
            secret:
              secretName: {{ .Release.Name }}-ssh
              defaultMode: 0400
          restartPolicy: OnFailure
