---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: blursed-pv
spec:
  claimRef:
    namespace: default
    name: blursed-pvc
  capacity:
    storage: 20Mi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Delete
  storageClassName: local-storage
  local:
    path: /srv/files
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - oldboy
