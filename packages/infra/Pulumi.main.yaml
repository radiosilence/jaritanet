# yaml-language-server: $schema=../../schemas/infra.json
# cloudflare:apiToken and hcloud:token are set via env vars in CI
# (CLOUDFLARE_API_TOKEN and HCLOUD_TOKEN). No need to encrypt them here.
config:
  jaritanet:cloudflare:
    accountId: ''
  jaritanet:traefik:
    # acmeEmail injected from the ACME_EMAIL secret in CI (see ci-cd.yml)
    acmeEmail: ''
    chartVersion: "41.0.2"
  jaritanet:mcpGateway:
    # hostname/authHostname injected in CI from MCP_HOSTNAME / MCP_AUTH_HOSTNAME
    # (kept out of this public repo). GitHub OAuth creds + allowlist come via
    # GH_CLIENT_ID / GH_CLIENT_SECRET / GH_ALLOWED env in CI.
    hostname: ''
    authHostname: ''
    hydraTag: "v2.2.0"
    replicas: 2
    limits:
      cpu: "500m"
      memory: "256Mi"
    image:
      # tag is auto-bumped to sha-<short> by jaritanet-mcp-gateway's ci-cd
      # (update-deployment job); `main` is the initial pointer.
      repository: "ghcr.io/radiosilence/jaritanet-mcp-gateway"
      tag: sha-815c2f2
      pullPolicy: "Always"
    backends:
      - id: fastmail
        name: Fastmail
        image: "ghcr.io/radiosilence/fastmail-cli:main"
        args: ["mcp", "--http", "0.0.0.0:8080"]
        port: 8080
        path: "/mcp"
        credentialHeader: "X-Fastmail-Token"
        keyHelpUrl: "https://app.fastmail.com/settings/security/tokens"
        keyHint: "fmu1-…"
  jaritanet:gateway:
    # xray shares :443; traffic that doesn't match a client falls back to
    # dest (local rathole https). serverName is injected from BLIT_HOSTNAME
    # in CI, so it stays out of plain config.
    xray:
      serverName: ''
      dest: 127.0.0.1:8443
    # Hysteria2 (QUIC/UDP) on 443/udp — fast, loss-tolerant daily driver
    hysteria: {}
    # Tailnet relay: joins the VPS to the tailnet so clients can reach 100.x
    # over the tunnel. Provisioned only when TS_AUTHKEY is set, so this is a
    # no-op until the secret exists.
    tailnet: {}
  # Egress exit nodes — ss-rust in the home cluster, reached via the rathole
  # tunnel, egressing the home residential IP. Selectable in the client as
  # exit-<name>; exits transit the primary gateway.
  # Egress exit nodes — where the gateway forwards your traffic out. Each is
  # just ss-rust + rathole; the gateway reaches it over the rathole tunnel.
  # `name` is all you set (drives the picker tag exit-<name> + resource names);
  # the loopback port is auto-derived from the name.
  jaritanet:exits:
    # oldboy — the home k8s cluster. Egresses your home residential IP.
    - name: oldboy
      # A Hetzner (or any) VPS exit is the same two daemons via cloud-init.
      # NOT WIRED YET — substrate `vps` is unimplemented (k8s only for now):
      # - name: fin
      #   substrate: vps
      #   location: hel1
  jaritanet:services:
    navidrome:
      hostname: ''
      args:
        httpPort: 4533
        strategy:
          type: Recreate
        image:
          repository: "deluan/navidrome"
          tag: 0.63.2
          pullPolicy: "Always"
        env:
          ND_SCANSCHEDULE: 1h
          ND_LOGLEVEL: info
          ND_SESSIONTIMEOUT: 24h
          ND_ENABLESHARING: "true"
          ND_ENABLETRANSCODINGCONFIG: "true"
          ND_TRANSCODINGCACHESIZE: 5Gi
          ND_ENABLEGRAVATAR: "true"
          ND_SCANNER_PURGEMISSING: "always"
          ND_UIWELCOMEMESSAGE: "fuck off"
        healthCheck:
          path: "/ping"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        limits:
          cpu: 2000m
          memory: 8Gi
        nodeSelector:
          key: kubernetes.io/hostname
          operator: In
          values:
            - oldboy
        persistence:
          - name: music
            storage: 2Ti
            hostPath: /mnt/kontent/music
            mountPath: /music
            readOnly: true
            nodeAffinityHostname: oldboy
          - name: data
            storage: 20Gi
            hostPath: /home/navidrome/data
            mountPath: /data
            readOnly: false
            nodeAffinityHostname: oldboy
    files:
      hostname: ''
      args:
        strategy:
          type: Recreate
        image:
          repository: "ghcr.io/radiosilence/jaritanet-files"
          tag: latest
          pullPolicy: "Always"
        replicas: 1
        healthCheck:
          path: "/"
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 5
        limits:
          cpu: 100m
          memory: 64Mi
        nodeSelector:
          key: kubernetes.io/hostname
          operator: In
          values:
            - oldboy
        persistence:
          - name: files
            storage: 20Mi
            hostPath: /srv/files
            mountPath: /srv/files
            readOnly: true
            nodeAffinityHostname: oldboy
    blit:
      hostname: ''
      args:
        replicas: 2
        healthCheck: {}
        limits:
          cpu: 1000m
          memory: 1024Mi
        image:
          repository: "ghcr.io/radiosilence/blit"
          tag: sha-5cf197c
          pullPolicy: "Always"
        httpPort: 3000
  jaritanet:zones:
    - name: "blit.cc"
      zoneId: "8aa9988e3df6b6a6ab4e4e6dbc3a2451"
      modules:
        - fastmail
        - bluesky
    - name: radiosilence.dev
      zoneId: 3373ad7c3dc3104e7aeab31c1176e684
      modules:
        - fastmail
        - bluesky
    - name: buttholes.live
      zoneId: 1115a1e5006523692d61e49e672f6df0
      modules:
        - fastmail
        - bluesky
  jaritanet:fastmail:
    mxDomain: smtp.messagingengine.com
    dkimDomain: dkim.fmhosted.com
    dkimSubdomain: _domainkey
    dmarcSubdomain: _dmarc
    dmarcAggEmail: dmarc-agg@blit.cc
    dmarcPolicy: reject
    spfDomain: spf.messagingengine.com
  jaritanet:bluesky:
    did: did:plc:d32vuqlfqjttwbckkxgxgbgl
