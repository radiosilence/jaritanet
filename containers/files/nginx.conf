worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /srv/files;

        # Direct access to hidden files and directories
        location ~ ^/\. {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH' always;
                add_header 'Access-Control-Allow-Headers' '*' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '3600' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '3600' always;
            add_header 'Access-Control-Expose-Headers' '*' always;
            add_header 'X-Content-Type-Options' 'nosniff' always;
            add_header 'X-Frame-Options' 'DENY' always;

            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;

            # Simple dark theme for hidden directories
            sub_filter_once on;
            sub_filter_types text/html;
            sub_filter '<html>' '<!DOCTYPE html><html lang="en" data-theme="dark">';
            sub_filter '<head><title>' '<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.24/dist/full.min.css" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><title>🗂️ ';
            sub_filter '<body>' '<body class="bg-base-100 min-h-screen"><div class="bg-base-200 border-b border-base-300"><div class="container mx-auto px-6 py-4"><h1 class="text-2xl font-semibold text-base-content flex items-center gap-3">🗂️ Jarita File Browser</h1></div></div><div class="container mx-auto px-6 py-8 max-w-7xl"><div class="bg-base-200 rounded-lg border border-base-300 p-6">';
            sub_filter '<h1>' '<div class="mb-6"><div class="breadcrumbs text-sm"><ul><li><a href="/" class="text-primary">Home</a></li><li class="opacity-70">';
            sub_filter '</h1><hr>' '</li></ul></div></div>';
            sub_filter '<pre>' '<div class="space-y-3">';
            sub_filter '<a href=' '<div class="flex items-center gap-3 p-3 rounded-lg border border-base-300 hover:bg-base-300 transition-colors"><span class="text-lg">📄</span><a href=';
            sub_filter '</a>' '</a></div>';
            sub_filter '</pre>' '</div>';
            sub_filter '</body>' '</div></div></body>';

            try_files $uri $uri/ =404;
        }

        # Main location for regular files and directories
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH' always;
                add_header 'Access-Control-Allow-Headers' '*' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' '3600' always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' '0' always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, HEAD, PATCH' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '3600' always;
            add_header 'Access-Control-Expose-Headers' '*' always;
            add_header 'X-Content-Type-Options' 'nosniff' always;
            add_header 'X-Frame-Options' 'DENY' always;

            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;

            # Dark flat theme with dotfile hiding
            sub_filter_once on;
            sub_filter_types text/html;

            # Transform to dark theme
            sub_filter '<html>' '<!DOCTYPE html><html lang="en" data-theme="dark">';
            sub_filter '<head><title>' '<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.24/dist/full.min.css" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><style>a[href^="."]:not([href="../"]) { display: none !important; }</style><title>🗂️ ';

            # Dark flat header
            sub_filter '<body>' '<body class="bg-base-100 min-h-screen"><div class="bg-base-200 border-b border-base-300"><div class="container mx-auto px-6 py-4"><h1 class="text-2xl font-semibold text-base-content flex items-center gap-3">🗂️ Jarita File Browser</h1></div></div><div class="container mx-auto px-6 py-8 max-w-7xl">';

            # Breadcrumbs
            sub_filter '<h1>Index of ' '<div class="mb-6"><div class="breadcrumbs text-sm"><ul><li><a href="/" class="text-primary">Home</a></li><li class="opacity-70">';
            sub_filter '</h1><hr>' '</li></ul></div></div><div class="bg-base-200 rounded-lg border border-base-300 p-6"><div class="space-y-3">';

            # Transform file list
            sub_filter '<pre>' '';
            sub_filter '<a href="../">../</a>' '<div class="flex items-center gap-3 p-3 rounded-lg border border-base-300 hover:bg-base-300 transition-colors"><span class="text-lg">⬆️</span><a href="../" class="text-base-content hover:text-primary font-medium">.. (Parent Directory)</a></div>';
            sub_filter '<a href=' '<div class="flex items-center gap-3 p-3 rounded-lg border border-base-300 hover:bg-base-300 transition-colors"><span class="text-lg">📄</span><a href=';
            sub_filter '</a>' '</a></div>';
            sub_filter '</pre>' '';

            # Footer
            sub_filter '</body>' '</div></div></div></body>';

            try_files $uri $uri/ =404;
        }
    }
}
