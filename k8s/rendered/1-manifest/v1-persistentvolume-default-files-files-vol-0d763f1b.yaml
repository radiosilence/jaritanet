apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pulumi.com/autonamed: "true"
  name: files-files-vol-0d763f1b
spec:
  accessModes:
  - ReadOnlyMany
  capacity:
    storage: 10Gi
  local:
    path: /srv/files
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - oldboy
  storageClassName: local-storage
