samba_shares:
  - name: music
    path: "/mnt/kontent/music"
    write_list: jc
  - name: movies
    path: "/mnt/kontent/movies"
    write_list: jc
  - name: tv
    path: "/mnt/kontent/tv"
    write_list: jc
  - name: files
    path: "/srv/files"
    write_list: jc

tailscale_routes:
  - 192.168.50.0/24

helm_configs:
  - name: navidrome
    type: local-server
    values: local-server/values/navidrome.yaml
  - name: files
    type: local-server
    values: local-server/values/files.yaml
  - name: ip-updater
    type: ip-updater
    values: ip-updater/values.yaml
