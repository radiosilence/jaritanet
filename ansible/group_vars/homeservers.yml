# Specific configuration for homeservers
microk8s:
  enabled: true
  addons:
    - community
    - dns
    - storage
    - rbac
    - hostpath-storage
    - metrics-server

syncthing:
  enabled: true
  config_dir: "/home/{{ username }}/.config/syncthing"
  ports:
    - 22000
    - 21027
    - 8384

samba:
  enabled: true
