# Config comes from CI env (GitHub Actions). Empty when run locally without it —
# the role no-ops in that case (see tasks/main.yml).
singbox_slug: "{{ lookup('env', 'SINGBOX_SLUG') }}"
singbox_files_hostname: "{{ lookup('env', 'FILES_HOSTNAME') }}"
singbox_tailnet_magicdns_suffix: "{{ lookup('env', 'SINGBOX_TAILNET_MAGICDNS_SUFFIX') }}"

# Every node (primary gateway + edges) as one JSON array, straight from the
# `singboxNodes` Pulumi stack output. Single source of truth — no per-value
# secrets. Empty array when unset → the role no-ops.
singbox_nodes: "{{ (lookup('env', 'SINGBOX_NODES') | default('[]', true)) | from_json }}"

# Telegram bot (token + your chat id) for delivering the profile URL + QR.
singbox_telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN') }}"
singbox_telegram_chat_id: "{{ lookup('env', 'TELEGRAM_CHAT_ID') }}"

# Force a notification even when the rendered config is unchanged (onboarding).
singbox_force_notify: "{{ lookup('env', 'SINGBOX_FORCE_NOTIFY') | default('', true) }}"

singbox_dest_dir: /srv/files/.sfm
singbox_qr_path: /tmp/singbox-qr.png
