# All config values come from CI env (GitHub Actions secrets). Empty when run
# locally without them — the role no-ops in that case (see tasks/main.yml).
singbox_slug: "{{ lookup('env', 'SINGBOX_SLUG') }}"
singbox_files_hostname: "{{ lookup('env', 'FILES_HOSTNAME') }}"

singbox_vps_ip: "{{ lookup('env', 'SINGBOX_VPS_IP') }}"
singbox_xray_uuid: "{{ lookup('env', 'SINGBOX_XRAY_UUID') }}"
singbox_xray_public_key: "{{ lookup('env', 'SINGBOX_XRAY_PUBLIC_KEY') }}"
singbox_xray_short_id: "{{ lookup('env', 'SINGBOX_XRAY_SHORT_ID') }}"
singbox_xray_server_name: "{{ lookup('env', 'SINGBOX_XRAY_SERVER_NAME') }}"
singbox_hysteria_auth_password: "{{ lookup('env', 'SINGBOX_HYSTERIA_AUTH_PASSWORD') }}"
singbox_hysteria_obfs_password: "{{ lookup('env', 'SINGBOX_HYSTERIA_OBFS_PASSWORD') }}"
singbox_tailnet_magicdns_suffix: "{{ lookup('env', 'SINGBOX_TAILNET_MAGICDNS_SUFFIX') }}"

# Telegram bot (token + your chat id) for delivering the profile URL + QR.
singbox_telegram_bot_token: "{{ lookup('env', 'TELEGRAM_BOT_TOKEN') }}"
singbox_telegram_chat_id: "{{ lookup('env', 'TELEGRAM_CHAT_ID') }}"

# Force a notification even when the rendered config is unchanged (onboarding).
singbox_force_notify: "{{ lookup('env', 'SINGBOX_FORCE_NOTIFY') | default('', true) }}"

# Canonical template, colocated in the role — single source of truth.
singbox_template_path: "{{ role_path }}/files/singbox.template.json"
singbox_dest_dir: /srv/files/.sfm
singbox_qr_path: /tmp/singbox-qr.png
