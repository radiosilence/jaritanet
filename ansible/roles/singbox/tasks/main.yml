# Renders the multi-node sing-box client profile from the Jinja2 template
# (one hy2 + reality pair per node, behind a location-picker selector), writes
# it to the file server's unguessable path, and pushes the URL + a QR to
# Telegram when it changes. No-ops when there are no nodes (e.g. local runs, or
# a deploy without the singboxNodes output).
- name: Render and distribute the sing-box client profile
  when: singbox_slug | length > 0 and singbox_nodes | length > 0
  block:
    - name: Assert required config present
      ansible.builtin.assert:
        that:
          - singbox_files_hostname | length > 0
          - singbox_tailnet_magicdns_suffix | length > 0
          - singbox_nodes | length > 0
        fail_msg: "sing-box: SINGBOX_NODES / FILES_HOSTNAME / magicdns suffix missing"
        quiet: true

    - name: Ensure the hosted profile directory exists
      ansible.builtin.file:
        path: "{{ singbox_dest_dir }}"
        state: directory
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0755"

    # template validates the rendered JSON before placing it, so a broken render
    # never overwrites a working profile. Registers changed → drives the notify.
    - name: Render the multi-node profile
      ansible.builtin.template:
        src: singbox.template.json.j2
        dest: "{{ singbox_dest_dir }}/{{ singbox_slug }}.json"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: "0644"
        validate: "python3 -c \"import json; json.load(open('%s'))\""
      register: singbox_written
      no_log: true

    - name: Build the profile URL
      ansible.builtin.set_fact:
        singbox_url: "https://{{ singbox_files_hostname }}/.sfm/{{ singbox_slug }}.json"

    - name: Build the notification caption
      ansible.builtin.set_fact:
        singbox_caption: |-
          sing-box profile updated ({{ singbox_nodes | length }} node{{ 's' if singbox_nodes | length != 1 else '' }})

          {{ singbox_url }}

          Add as a Remote profile (auto-refreshes every device on "Update").
          Pick a location in the app's Groups tab. Scan the QR to onboard a
          phone. Keep this URL secret — the unguessable path guards it.

    # Delivery runs on the controller (localhost) — it needs the QR tool and
    # egress to Telegram, not the target. Only fires when the profile changed,
    # or when explicitly forced (device onboarding).
    - name: Notify via Telegram
      when: >-
        (singbox_written is changed or singbox_force_notify | length > 0)
        and singbox_telegram_bot_token | length > 0
        and singbox_telegram_chat_id | length > 0
      delegate_to: localhost
      become: false
      run_once: true
      block:
        - name: Check for qrencode
          ansible.builtin.command: qrencode --version
          register: singbox_qrencode
          failed_when: false
          changed_when: false

        - name: Generate a QR code for the profile URL
          ansible.builtin.command: "qrencode -o {{ singbox_qr_path }} -s 8 -m 2 {{ singbox_url }}"
          when: singbox_qrencode.rc == 0
          changed_when: true

        - name: Send the profile URL + QR photo
          ansible.builtin.command:
            argv:
              - curl
              - -fsS
              - -X
              - POST
              - "https://api.telegram.org/bot{{ singbox_telegram_bot_token }}/sendPhoto"
              - -F
              - "chat_id={{ singbox_telegram_chat_id }}"
              - -F
              - "photo=@{{ singbox_qr_path }}"
              - -F
              - "caption={{ singbox_caption }}"
          when: singbox_qrencode.rc == 0
          changed_when: true
          no_log: true

        - name: Send the profile URL (no QR tool available)
          ansible.builtin.command:
            argv:
              - curl
              - -fsS
              - -X
              - POST
              - "https://api.telegram.org/bot{{ singbox_telegram_bot_token }}/sendMessage"
              - -F
              - "chat_id={{ singbox_telegram_chat_id }}"
              - -F
              - "text={{ singbox_caption }}"
          when: singbox_qrencode.rc != 0
          changed_when: true
          no_log: true
