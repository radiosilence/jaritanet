# Maps the canonical template's <PLACEHOLDER> tokens to injected secrets. When
# the template gains a new token, add it here — the render step asserts that no
# <PLACEHOLDER> survives, so a missing entry fails the run loudly.
singbox_placeholders:
  - { token: "<VPS_IP>", value: "{{ singbox_vps_ip }}" }
  - { token: "<XRAY_UUID>", value: "{{ singbox_xray_uuid }}" }
  - { token: "<XRAY_PUBLIC_KEY>", value: "{{ singbox_xray_public_key }}" }
  - { token: "<XRAY_SHORT_ID>", value: "{{ singbox_xray_short_id }}" }
  - { token: "<XRAY_SERVER_NAME>", value: "{{ singbox_xray_server_name }}" }
  - { token: "<HYSTERIA_AUTH_PASSWORD>", value: "{{ singbox_hysteria_auth_password }}" }
  - { token: "<HYSTERIA_OBFS_PASSWORD>", value: "{{ singbox_hysteria_obfs_password }}" }
  - { token: "<TAILNET_MAGICDNS_SUFFIX>", value: "{{ singbox_tailnet_magicdns_suffix }}" }
