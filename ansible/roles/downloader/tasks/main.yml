- name: Install media tools from apt
  ansible.builtin.apt:
    name:
      - ffmpeg
      - aria2
    state: present

- name: Install yt-dlp and get-iplayer via mise
  ansible.builtin.shell:
    cmd: |
      mise use --global yt-dlp@latest
      mise use --global get-iplayer@latest
  become: true
  become_user: "{{ username }}"
  changed_when: false
