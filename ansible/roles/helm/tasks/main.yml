- name: "Copy helm charts to host"
  ansible.builtin.copy:
    src: "{{ helm.local_chart_dir }}"
    dest: "{{ helm.charts_dir }}"
    force: true
    delete: true
    recursive: true
    mode: "0644"

- name: "Ensure Helm charts are deployed"
  kubernetes.core.helm:
    name: "{{ item }}"
    binary_path: /snap/bin/microk8s.helm
    chart_ref: "{{ helm.charts_dir }}"
    values_files:
      - "{{ helm.charts_dir }}/{{ item }}.yaml"
    create_namespace: true
    release_namespace: "{{ item }}"
    release_state: present
  with_items: "{{ helm_configs }}"
