---
- name: Install required system packages
  ansible.builtin.apt:
    name:
      - snapd
    state: present

- name: Install microk8s via snap
  community.general.snap:
    name: microk8s
    classic: true
    channel: stable

- name: Create microk8s group
  ansible.builtin.group:
    name: microk8s
    state: present

- name: Add current user to microk8s group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups:
      - microk8s
    append: true

- name: Add user to microk8s group
  ansible.builtin.user:
    name: "{{ username }}"
    groups:
      - microk8s
    append: true

- name: Check if MicroK8s is running
  ansible.builtin.command: microk8s status --wait-ready
  register: microk8s_status
  failed_when: microk8s_status.rc not in [0, 1]

- name: Start MicroK8s if not running
  ansible.builtin.command: microk8s start
  when: microk8s_status.rc != 0

- name: Enable microk8s addons
  ansible.builtin.command: "microk8s enable {{ item }}"
  loop:
    - community
    - ingress
    - dns
    - storage
    - cert-manager
    - helm
  register: microk8s_addons
  changed_when: microk8s_addons.rc == 0

- name: Deploy latest version of Prometheus chart inside monitoring namespace (and create it)
  kubernetes.core.helm:
    name: { { item } }
    path: ../charts
    values_files:
      - ../charts/values/{{ item }}.yaml
  with_items: "{{ k8s_configs }}"
