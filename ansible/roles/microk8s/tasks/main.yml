- name: Install required system packages
  ansible.builtin.apt:
    name:
      - snapd
    state: present

- name: Install microk8s via snap
  community.general.snap:
    name: microk8s
    classic: true
    channel: stable

- name: Create microk8s group
  ansible.builtin.group:
    name: microk8s
    state: present

- name: Add current user to microk8s group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups:
      - microk8s
    append: true

- name: Add user to microk8s group
  ansible.builtin.user:
    name: "{{ username }}"
    groups:
      - microk8s
    append: true

- name: Check if MicroK8s is running
  ansible.builtin.command: microk8s status --wait-ready
  register: microk8s_status
  failed_when: microk8s_status.rc not in [0, 1]

- name: Start MicroK8s if not running
  ansible.builtin.command: microk8s start
  when: microk8s_status.rc != 0

- name: Enable microk8s addons
  ansible.builtin.command: "microk8s enable {{ item }}"
  loop:
    - community
    - dns
    - storage
    - helm
    - rbac
  notify: restart microk8s

- name: Generate kubeconf with microk8s config
  ansible.builtin.shell:
    cmd: |
      mkdir -p ~/.kube
      microk8s kubectl config view --raw > ~/.kube/config
  register: kubeconfig

- name: Create service account for GitHub deployments
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: github-deployer
        namespace: default

- name: Create cluster role binding for deployer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: github-deployer-admin
      subjects:
        - kind: ServiceAccount
          name: github-deployer
          namespace: default
      roleRef:
        kind: ClusterRole
        name: cluster-admin
        apiGroup: rbac.authorization.k8s.io

- name: Create service account token
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: github-deployer-token
        namespace: default
        annotations:
          kubernetes.io/service-account.name: github-deployer
      type: kubernetes.io/service-account-token

- name: Wait for token to be populated
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: github-deployer-token
    namespace: default
  register: token_secret
  until: token_secret.resources[0].data.token is defined
  retries: 10
  delay: 5

- name: Get microk8s CA certificate
  ansible.builtin.command: microk8s kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}'
  register: cluster_ca_cert

- name: Create secrets directory
  ansible.builtin.file:
    path: "{{ inventory_dir }}/secrets"
    state: directory
    mode: "0700"

- name: Create secrets file for GitHub Actions
  ansible.builtin.copy:
    dest: "{{ inventory_dir }}/secrets/github-secrets.json"
    mode: "0600"
    content: |
      {
        "KUBE_TOKEN": "{{ token_secret.resources[0].data.token }}",
        "KUBE_CA_CERT": "{{ cluster_ca_cert.stdout }}",
        "KUBE_API_PORT": "16443"
      }

- name: Get Tailscale hostname
  ansible.builtin.command: tailscale status --json
  register: tailscale_status

- name: Parse Tailscale hostname
  ansible.builtin.set_fact:
    tailscale_hostname: "{{ (tailscale_status.stdout | from_json).Self.DNSName | regex_replace('\\.$', '') }}"

- name: Add Tailscale hostname to secrets
  ansible.builtin.command: |
    jq '.KUBE_HOST = "{{ tailscale_hostname }}"' {{ inventory_dir }}/secrets/github-secrets.json > {{ inventory_dir }}/secrets/github-secrets.json.tmp && 
    mv {{ inventory_dir }}/secrets/github-secrets.json.tmp {{ inventory_dir }}/secrets/github-secrets.json

# handlers/main.yml
- name: restart microk8s
  ansible.builtin.command: snap restart microk8s
