- name: Install required system packages
  ansible.builtin.apt:
    name:
      - snapd
    state: present

- name: Install microk8s via snap
  community.general.snap:
    name: microk8s
    classic: true
    channel: stable

- name: Create microk8s group
  ansible.builtin.group:
    name: microk8s
    state: present

- name: Add current user to microk8s group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups:
      - microk8s
    append: true

- name: Add user to microk8s group
  ansible.builtin.user:
    name: "{{ username }}"
    groups:
      - microk8s
    append: true

- name: Check if MicroK8s is running
  ansible.builtin.command: microk8s status --wait-ready
  register: microk8s_status
  failed_when: microk8s_status.rc not in [0, 1]

- name: Start MicroK8s if not running
  ansible.builtin.command: microk8s start
  when: microk8s_status.rc != 0

- name: Enable microk8s addons
  ansible.builtin.command: "microk8s enable {{ item }}"
  loop:
    - community
    - dns
    - storage
    - helm
    - rbac
  notify: restart microk8s

- name: Create service account for GitHub deployments
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: github-deployer
        namespace: default

- name: Create cluster role binding for deployer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: github-deployer-admin
      subjects:
        - kind: ServiceAccount
          name: github-deployer
          namespace: default
      roleRef:
        kind: ClusterRole
        name: cluster-admin
        apiGroup: rbac.authorization.k8s.io

- name: Get service account token
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: default
    field_selectors:
      - type=kubernetes.io/service-account-token
    label_selectors:
      - kubernetes.io/service-account.name=github-deployer
  register: sa_token_secret

- name: Save token to a file
  copy:
    content: "{{ sa_token_secret.resources[0].data.token | b64decode }}"
    dest: "/root/github-deployer-token"
    mode: "0600"
  when: sa_token_secret.resources | length > 0
