- name: Install required system packages
  ansible.builtin.apt:
    name:
      - snapd
    state: present

- name: Enable microk8s addons
  community.general.snap_addon:
    snap_name: microk8s
    name: "{{ item }}"
    state: present
  loop:
    - community
    - dns
    - storage
    - helm
    - rbac
  notify: restart microk8s

- name: Create service account for GitHub deployments
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: github-deployer
        namespace: default

- name: Create cluster role binding for deployer
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: github-deployer-admin
      subjects:
        - kind: ServiceAccount
          name: github-deployer
          namespace: default
      roleRef:
        kind: ClusterRole
        name: cluster-admin
        apiGroup: rbac.authorization.k8s.io

- name: Get service account token
  kubernetes.core.k8s_info:
    kind: Secret
    namespace: default
    field_selectors:
      - type=kubernetes.io/service-account-token
    label_selectors:
      - kubernetes.io/service-account.name=github-deployer
  register: sa_token_secret

- name: Save token to a file
  copy:
    content: "{{ sa_token_secret.resources[0].data.token | b64decode }}"
    dest: "/root/github-deployer-token"
    mode: "0600"
  when: sa_token_secret.resources | length > 0

- name: Configure microk8s for external access
  community.general.snap_config:
    snap_name: microk8s
    key: listen-address
    value: "0.0.0.0" # Will listen on all interfaces including Tailscale
  notify: restart microk8s
