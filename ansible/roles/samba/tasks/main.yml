- name: Install required system packages
  ansible.builtin.apt:
    name:
      - samba
      - samba-common
    state: present

# Anonymous, read-only access — no logins. Unknown users map to guest (which
# runs as the media owner so reads succeed), and connections are restricted to
# the tailnet + LAN so the open shares aren't reachable from anywhere else.
- name: Configure Samba global settings for anonymous tailnet access
  ansible.builtin.blockinfile:
    path: /etc/samba/smb.conf
    insertafter: '^\[global\]'
    block: |
      map to guest = Bad User
      guest account = {{ username }}
      hosts allow = 100.64.0.0/10 192.168.0.0/16 127.0.0.1
    marker: "# {mark} ANSIBLE MANAGED SAMBA GLOBALS"

- name: Configure Samba shares
  ansible.builtin.blockinfile:
    path: /etc/samba/smb.conf
    block: |
      {% for share in shares %}
      [{{ share.name }}]
          path = {{ share.path }}
          browseable = yes
          read only = yes
          guest ok = yes
          guest only = yes
          create mask = 0664
          directory mask = 0775
      {% endfor %}
    marker: "# {mark} ANSIBLE MANAGED SAMBA SHARES"

- name: Restart Samba services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: restarted
    enabled: true
  loop:
    - smbd
    - nmbd
