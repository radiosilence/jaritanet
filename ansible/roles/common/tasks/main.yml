# The installer left the base repos as a bare `noble` pocket (release snapshot),
# so no security/update fixes were ever seen — dist-upgrade ran against a frozen
# April-2024 tree. Manage the base sources here so it can't drift again.
- name: Configure Ubuntu base apt repositories
  ansible.builtin.deb822_repository:
    name: ubuntu
    types: [deb]
    uris: http://archive.ubuntu.com/ubuntu
    suites:
      - "{{ ansible_distribution_release }}"
      - "{{ ansible_distribution_release }}-updates"
      - "{{ ansible_distribution_release }}-backports"
    components: [main, restricted, universe, multiverse]
    signed_by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
    state: present
    enabled: true

- name: Configure Ubuntu security apt repository
  ansible.builtin.deb822_repository:
    name: ubuntu-security
    types: [deb]
    uris: http://security.ubuntu.com/ubuntu
    suites: ["{{ ansible_distribution_release }}-security"]
    components: [main, restricted, universe, multiverse]
    signed_by: /usr/share/keyrings/ubuntu-archive-keyring.gpg
    state: present
    enabled: true

- name: Remove stale single-file apt sources.list
  ansible.builtin.file:
    path: /etc/apt/sources.list
    state: absent

- name: Update all packages to the latest version (dist-upgrade)
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

- name: Install required system packages
  ansible.builtin.apt:
    name:
      - snapd
      - python3-pip
      - python3-kubernetes
      - python3-k8sclient
      - acl
      - zsh
      - btop
      - broot
      - aria2
      - ffmpeg
    state: present

- name: Enable BBR congestion control + fq qdisc
  # Matches the gateway VPS. Default cubic collapses on loss; BBR holds the pipe
  # open — helps the rathole client→gateway leg and the exit's own egress.
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-network-tuning.conf
    content: |
      net.core.default_qdisc = fq
      net.ipv4.tcp_congestion_control = bbr
    owner: root
    group: root
    mode: "0644"
  register: bbr_sysctl

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  when: bbr_sysctl.changed
  changed_when: true

- name: Include SSH hardening tasks
  ansible.builtin.include_tasks: ssh_hardening.yml
