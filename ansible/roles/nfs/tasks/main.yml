---
- name: Configure NFS shares
  hosts: nfs_servers
  become: yes
  tasks:
    - name: Install NFS server
      package:
        name: nfs-kernel-server
        state: present

    - name: Create share directories
      file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner }}"
        group: "{{ item.owner }}"
        mode: "0775"
      with_items: "{{ shares }}"

    - name: Get UID for users
      command: "id -u {{ item.owner }}"
      register: user_uids
      changed_when: false
      with_items: "{{ shares }}"

    - name: Add NFS exports
      lineinfile:
        path: /etc/exports
        line: "{{ item.0.path }} *(rw,sync,no_subtree_check,all_squash,anonuid={{ item.1.stdout }},anongid={{ item.1.stdout }})"
        create: yes
      with_together:
        - "{{ shares }}"
        - "{{ user_uids.results }}"

    - name: Export NFS shares
      command: exportfs -ra
      changed_when: true

    - name: Enable and start NFS server
      systemd:
        name: nfs-kernel-server
        enabled: yes
        state: started

    - name: Open NFS ports in firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      with_items:
        - 2049
        - 111
