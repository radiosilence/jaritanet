# roles/tailscale/tasks/main.yml
---
- name: Install required packages for Tailscale
  ansible.builtin.apt:
    name:
      - curl
      - gpg
    state: present

- name: Import Tailscale GPG key
  ansible.builtin.apt_key:
    url: https://pkgs.tailscale.com/stable/ubuntu/focal.gpg
    state: present

- name: Add Tailscale repository
  ansible.builtin.apt_repository:
    repo: "deb https://pkgs.tailscale.com/stable/ubuntu focal main"
    filename: tailscale
    state: present

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    update_cache: true
    state: present

- name: Configure Tailscale authentication
  block:
    - name: Authenticate with Tailscale
      ansible.builtin.command: >
        tailscale up
        --authkey="{{  lookup('community.general.onepassword', 'tailscale_authkey') }}"
        {% if tailscale.tags is defined %}
        --advertise-tags="{{ tailscale.tags | join(',') }}"
        {% endif %}
        --accept-routes
        --accept-dns
      register: tailscale_auth
      changed_when: tailscale_auth.rc == 0
      failed_when: tailscale_auth.rc != 0
      no_log: true # Prevent token from being logged

- name: Ensure Tailscale starts on boot
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Output Tailscale IP for reference
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Display Tailscale IP
  ansible.builtin.debug:
    msg: "Tailscale IP: {{ tailscale_ip.stdout }}"
