# Roles are tagged with their own name so CI can run only what changed
# (see .github/workflows/run-playbook.yml). A bare run (no --tags) runs everything.
- name: Ensure common configurations are applied
  hosts: all
  become: true
  vars_files:
    - group_vars/all.yml

  roles:
    - { role: common, tags: [common] }
    - { role: users, tags: [users] }
    - { role: helix, tags: [helix] }
    - { role: mise, tags: [mise] }
    - { role: github, tags: [github] }

- name: Ensure homeserver configurations are applied
  hosts: homeservers
  become: true
  vars_files:
    - group_vars/homeservers.yml

  roles:
    - { role: downloader, tags: [downloader] }
    - { role: microk8s, tags: [microk8s] }
    - { role: nfs, tags: [nfs] }
    - { role: samba, tags: [samba] }
    - { role: syncthing, tags: [syncthing] }
    - { role: singbox, tags: [singbox] }

- name: Ensure tailnet is joined
  hosts: tailnet
  become: true
  vars_files:
    - group_vars/tailnet.yml

  roles:
    - { role: tailscale, tags: [tailscale] }
